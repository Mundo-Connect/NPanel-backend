syntax = "proto3";

package api.admin.user.v1;

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/user/v1;v1";

import "google/api/annotations.proto";
import "admin/user/v1/device.proto";
import "admin/user/v1/user.proto";

// UserSubscribeService 用户订阅管理服务
service UserSubscribeService {
  // GetUserSubscribe 获取用户订阅列表
  rpc GetUserSubscribe(GetUserSubscribeRequest) returns (GetUserSubscribeReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe"
    };
  }

  // CreateUserSubscribe 创建用户订阅
  rpc CreateUserSubscribe(CreateUserSubscribeRequest) returns (CreateUserSubscribeReply) {
    option (google.api.http) = {
      post: "/v1/admin/user/subscribe"
      body: "*"
    };
  }

  // UpdateUserSubscribe 更新用户订阅
  rpc UpdateUserSubscribe(UpdateUserSubscribeRequest) returns (UpdateUserSubscribeReply) {
    option (google.api.http) = {
      put: "/v1/admin/user/subscribe"
      body: "*"
    };
  }

  // DeleteUserSubscribe 删除用户订阅
  rpc DeleteUserSubscribe(DeleteUserSubscribeRequest) returns (DeleteUserSubscribeReply) {
    option (google.api.http) = {
      delete: "/v1/admin/user/subscribe"
    };
  }

  // GetUserSubscribeById 根据ID获取用户订阅详情
  rpc GetUserSubscribeById(GetUserSubscribeByIdRequest) returns (GetUserSubscribeByIdReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe/detail"
    };
  }

  // GetUserSubscribeDevices 获取用户订阅设备列表
  rpc GetUserSubscribeDevices(GetUserSubscribeDevicesRequest) returns (GetUserSubscribeDevicesReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe/device"
    };
  }

  // GetUserSubscribeLogs 获取用户订阅日志
  rpc GetUserSubscribeLogs(GetUserSubscribeLogsRequest) returns (GetUserSubscribeLogsReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe/logs"
    };
  }

  // GetUserSubscribeResetTrafficLogs 获取用户订阅重置流量日志
  rpc GetUserSubscribeResetTrafficLogs(GetUserSubscribeResetTrafficLogsRequest) returns (GetUserSubscribeResetTrafficLogsReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe/reset/logs"
    };
  }

  // GetUserSubscribeTrafficLogs 获取用户订阅流量日志
  rpc GetUserSubscribeTrafficLogs(GetUserSubscribeTrafficLogsRequest) returns (GetUserSubscribeTrafficLogsReply) {
    option (google.api.http) = {
      get: "/v1/admin/user/subscribe/traffic_logs"
    };
  }

  // ResetUserSubscribeToken 重置用户订阅令牌
  rpc ResetUserSubscribeToken(ResetUserSubscribeTokenRequest) returns (ResetUserSubscribeTokenReply) {
    option (google.api.http) = {
      post: "/v1/admin/user/subscribe/reset/token"
      body: "*"
    };
  }

  // ToggleUserSubscribeStatus 切换用户订阅状态
  rpc ToggleUserSubscribeStatus(ToggleUserSubscribeStatusRequest) returns (ToggleUserSubscribeStatusReply) {
    option (google.api.http) = {
      post: "/v1/admin/user/subscribe/toggle"
      body: "*"
    };
  }

  // ResetUserSubscribeTraffic 重置用户订阅流量
  rpc ResetUserSubscribeTraffic(ResetUserSubscribeTrafficRequest) returns (ResetUserSubscribeTrafficReply) {
    option (google.api.http) = {
      post: "/v1/admin/user/subscribe/reset/traffic"
      body: "*"
    };
  }
}

// ===== GetUserSubscribe =====

message GetUserSubscribeRequest {
  int32 page = 1;
  int32 size = 2;
  int64 user_id = 3;
}

message GetUserSubscribeData {
  int32 total = 1;
  repeated UserSubscribe list = 2;
}

message GetUserSubscribeReply {
  int32 code = 1;
  string message = 2;
  GetUserSubscribeData data = 3;
}

// ===== CreateUserSubscribe =====

message CreateUserSubscribeRequest {
  int64 user_id = 1;
  int64 expired_at = 2;
  int64 traffic = 3;
  int64 subscribe_id = 4;
}

message CreateUserSubscribeReply {
  int32 code = 1;
  string message = 2;
}

// ===== UpdateUserSubscribe =====

message UpdateUserSubscribeRequest {
  int64 user_subscribe_id = 1;
  int64 subscribe_id = 2;
  int64 traffic = 3;
  int64 expired_at = 4;
  int64 upload = 5;
  int64 download = 6;
}

message UpdateUserSubscribeReply {
  int32 code = 1;
  string message = 2;
}

// ===== DeleteUserSubscribe =====

message DeleteUserSubscribeRequest {
  int64 user_subscribe_id = 1;
}

message DeleteUserSubscribeReply {
  int32 code = 1;
  string message = 2;
}

// ===== GetUserSubscribeById =====

message GetUserSubscribeByIdRequest {
  int64 id = 1;
}

message GetUserSubscribeByIdReply {
  int32 code = 1;
  string message = 2;
  UserSubscribeDetail data = 3;
}

// ===== GetUserSubscribeDevices =====

message GetUserSubscribeDevicesRequest {
  int32 page = 1;
  int32 size = 2;
  int64 user_id = 3;
  int64 subscribe_id = 4;
}

message GetUserSubscribeDevicesData {
  int32 total = 1;
  repeated UserDevice list = 2;
}

message GetUserSubscribeDevicesReply {
  int32 code = 1;
  string message = 2;
  GetUserSubscribeDevicesData data = 3;
}

// ===== GetUserSubscribeLogs =====

message GetUserSubscribeLogsRequest {
  int32 page = 1;
  int32 size = 2;
  int64 user_id = 3;
  int64 subscribe_id = 4;
  int64 user_subscribe_id = 5;
  string date = 6;
}

message GetUserSubscribeLogsData {
  int32 total = 1;
  repeated UserSubscribeLog list = 2;
}

message GetUserSubscribeLogsReply {
  int32 code = 1;
  string message = 2;
  GetUserSubscribeLogsData data = 3;
}

// ===== GetUserSubscribeResetTrafficLogs =====

message GetUserSubscribeResetTrafficLogsRequest {
  int32 page = 1;
  int32 size = 2;
  int64 user_subscribe_id = 3;
  string date = 4;
}

message GetUserSubscribeResetTrafficLogsData {
  int32 total = 1;
  repeated ResetSubscribeTrafficLog list = 2;
}

message GetUserSubscribeResetTrafficLogsReply {
  int32 code = 1;
  string message = 2;
  GetUserSubscribeResetTrafficLogsData data = 3;
}

// ===== GetUserSubscribeTrafficLogs =====

message GetUserSubscribeTrafficLogsRequest {
  int32 page = 1;
  int32 size = 2;
  int64 user_id = 3;
  int64 subscribe_id = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  int64 user_subscribe_id = 7;
  string date = 8;
}

message GetUserSubscribeTrafficLogsData {
  int32 total = 1;
  repeated TrafficLog list = 2;
}

message GetUserSubscribeTrafficLogsReply {
  int32 code = 1;
  string message = 2;
  GetUserSubscribeTrafficLogsData data = 3;
}

// ===== ResetUserSubscribeToken =====

message ResetUserSubscribeTokenRequest {
  int64 user_subscribe_id = 1;
}

message ResetUserSubscribeTokenReply {
  int32 code = 1;
  string message = 2;
}

// ===== ToggleUserSubscribeStatus =====

message ToggleUserSubscribeStatusRequest {
  int64 user_subscribe_id = 1;
}

message ToggleUserSubscribeStatusReply {
  int32 code = 1;
  string message = 2;
}

// ===== ResetUserSubscribeTraffic =====

message ResetUserSubscribeTrafficRequest {
  int64 user_subscribe_id = 1;
}

message ResetUserSubscribeTrafficReply {
  int32 code = 1;
  string message = 2;
}

// ===== Common Messages =====

// UserSubscribe 用户订阅
message UserSubscribe {
  int64 id = 1;
  string id_str = 2;
  int64 user_id = 3;
  int64 order_id = 4;
  int64 subscribe_id = 5;
  Subscribe subscribe = 6;
  int64 node_group_id = 7;
  bool group_locked = 8;
  int64 start_time = 9;
  int64 expire_time = 10;
  int64 finished_at = 11;
  int64 reset_time = 12;
  int64 traffic = 13;
  int64 download = 14;
  int64 upload = 15;
  string token = 16;
  uint32 status = 17;
  string short = 18;
  int64 created_at = 19;
  int64 updated_at = 20;
}

// UserSubscribeDetail 用户订阅详情（含关联对象）
message UserSubscribeDetail {
  int64 id = 1;
  int64 user_id = 2;
  User user = 3;
  int64 order_id = 4;
  int64 subscribe_id = 5;
  Subscribe subscribe = 6;
  int64 node_group_id = 7;
  bool group_locked = 8;
  int64 start_time = 9;
  int64 expire_time = 10;
  int64 reset_time = 11;
  int64 traffic = 12;
  int64 download = 13;
  int64 upload = 14;
  string token = 15;
  uint32 status = 16;
  int64 created_at = 17;
  int64 updated_at = 18;
}

message Subscribe {
  int64 id = 1;
  string name = 2;
  string description = 3;
  int64 unit_price = 4;
  string unit_time = 5;
  int64 traffic = 6;
  int32 speed_limit = 7;
  int32 device_limit = 8;
  int32 reset_cycle = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
  string language = 12;
  repeated SubscribeDiscount discount = 13;
  int64 replacement = 14;
  int32 inventory = 15;
  int32 quota = 16;
  repeated int64 nodes = 17;
  repeated string node_tags = 18;
  repeated int64 node_group_ids = 19;
  int64 node_group_id = 20;
  bool show = 21;
  bool sell = 22;
  int32 sort = 23;
  int32 deduction_ratio = 24;
  bool allow_deduction = 25;
  bool renewal_reset = 26;
  bool show_original_price = 27;
  repeated TrafficLimit traffic_limit = 28;
}

message SubscribeDiscount {
  int64 quantity = 1;
  int64 discount = 2;
}

message TrafficLimit {
  string stat_type = 1;
  int64 stat_value = 2;
  int64 traffic_usage = 3;
  int32 speed_limit = 4;
}

// UserSubscribeLog 用户订阅日志
message UserSubscribeLog {
  int64 id = 1;
  int64 user_id = 2;
  int64 user_subscribe_id = 3;
  string token = 4;
  string ip = 5;
  string user_agent = 6;
  int64 timestamp = 7;
}

// ResetSubscribeTrafficLog 重置流量日志
message ResetSubscribeTrafficLog {
  int64 id = 1;
  int32 type = 2;
  int64 user_subscribe_id = 3;
  string order_no = 4;
  int64 timestamp = 5;
}

// TrafficLog 流量日志
message TrafficLog {
  int64 id = 1;
  int64 server_id = 2;
  int64 user_id = 3;
  int64 subscribe_id = 4;
  int64 download = 5;
  int64 upload = 6;
  int64 timestamp = 7;
}


