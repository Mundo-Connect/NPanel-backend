syntax = "proto3";

package api.admin.document.v1;

import "google/api/annotations.proto";
import "google/protobuf/wrappers.proto";
import "validate/validate.proto";

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/document/v1;v1";

// 文档管理服务
service DocumentService {
  // 创建文档
  rpc CreateDocument(CreateDocumentRequest) returns (CreateDocumentReply) {
    option (google.api.http) = {
      post: "/v1/admin/document"
      body: "*"
    };
  }

  // 更新文档
  rpc UpdateDocument(UpdateDocumentRequest) returns (UpdateDocumentReply) {
    option (google.api.http) = {
      put: "/v1/admin/document"
      body: "*"
    };
  }

  // 删除文档
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentReply) {
    option (google.api.http) = {
      delete: "/v1/admin/document"
    };
  }

  // 批量删除文档
  rpc BatchDeleteDocument(BatchDeleteDocumentRequest) returns (BatchDeleteDocumentReply) {
    option (google.api.http) = {
      delete: "/v1/admin/document/batch"
    };
  }

  // 获取文档列表
  rpc GetDocumentList(GetDocumentListRequest) returns (GetDocumentListReply) {
    option (google.api.http) = {
      get: "/v1/admin/document/list"
    };
  }

  // 获取文档详情
  rpc GetDocumentDetail(GetDocumentDetailRequest) returns (GetDocumentDetailReply) {
    option (google.api.http) = {
      get: "/v1/admin/document/detail"
    };
  }
}

// 文档信息
message Document {
  int64 id = 1;
  string title = 2;
  string content = 3;
  repeated string tags = 4;
  bool show = 5;
  int64 created_at = 6;  // Unix timestamp in seconds
  int64 updated_at = 7;  // Unix timestamp in seconds
}

// 创建文档请求
message CreateDocumentRequest {
  string title = 1 [(validate.rules).string.min_len = 1];
  string content = 2 [(validate.rules).string.min_len = 1];
  repeated string tags = 3;
  google.protobuf.BoolValue show = 4;
}

// 创建文档响应
message CreateDocumentReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// 更新文档请求
message UpdateDocumentRequest {
  int64 id = 1;
  string title = 2 [(validate.rules).string.min_len = 1];
  string content = 3 [(validate.rules).string.min_len = 1];
  repeated string tags = 4;
  google.protobuf.BoolValue show = 5;
}

// 更新文档响应
message UpdateDocumentReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// 删除文档请求
message DeleteDocumentRequest {
  int64 id = 1;
}

// 删除文档数据
message DeleteDocumentData {
  bool success = 1;
}

// 删除文档响应
message DeleteDocumentReply {
  int32 code = 1;                   // 状态码
  string message = 2;               // 消息内容
  DeleteDocumentData data = 3;      // 响应数据
}

// 批量删除文档请求
message BatchDeleteDocumentRequest {
  repeated int64 ids = 1;
}

// 批量删除文档数据
message BatchDeleteDocumentData {
  bool success = 1;
}

// 批量删除文档响应
message BatchDeleteDocumentReply {
  int32 code = 1;                      // 状态码
  string message = 2;                  // 消息内容
  BatchDeleteDocumentData data = 3;    // 响应数据
}

// 获取文档列表请求
message GetDocumentListRequest {
  int64 page = 1;
  int64 size = 2;
  string tag = 3;
  string search = 4;
}

// 获取文档列表数据
message GetDocumentListData {
  int32 total = 1;
  repeated Document list = 2;
}

// 获取文档列表响应
message GetDocumentListReply {
  int32 code = 1;                    // 状态码
  string message = 2;                // 消息内容
  GetDocumentListData data = 3;      // 响应数据
}

// 获取文档详情请求
message GetDocumentDetailRequest {
  int64 id = 1;
}

// 获取文档详情数据
message GetDocumentDetailData {
  Document document = 1;
}

// 获取文档详情响应
message GetDocumentDetailReply {
  int32 code = 1;                     // 状态码
  string message = 2;                 // 消息内容
  GetDocumentDetailData data = 3;     // 响应数据
}
