syntax = "proto3";

package api.admin.withdrawal.v1;

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/withdrawal/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.withdrawal.v1";

import "google/api/annotations.proto";

service WithdrawalService {
  rpc GetWithdrawalList(GetWithdrawalListRequest) returns (GetWithdrawalListReply) {
    option (google.api.http) = {
      get: "/v1/admin/withdrawal/list"
    };
  }

  rpc ApproveWithdrawal(ApproveWithdrawalRequest) returns (ApproveWithdrawalReply) {
    option (google.api.http) = {
      post: "/v1/admin/withdrawal/approve"
      body: "*"
    };
  }

  rpc RejectWithdrawal(RejectWithdrawalRequest) returns (RejectWithdrawalReply) {
    option (google.api.http) = {
      post: "/v1/admin/withdrawal/reject"
      body: "*"
    };
  }
}

message Withdrawal {
  int64 id = 1;
  int64 user_id = 2;
  int64 amount = 3;
  string method = 4;
  string content = 5;
  int32 status = 6;
  string reason = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  int64 processed_at = 10;
}

message GetWithdrawalListRequest {
  int64 page = 1;
  int64 size = 2;
  optional int64 user_id = 3;
  optional int32 status = 4;
  string method = 5;
}

message GetWithdrawalListReply {
  int32 code = 1;
  string message = 2;
  WithdrawalListData data = 3;
}

message WithdrawalListData {
  repeated Withdrawal list = 1;
  int32 total = 2;
}

message ApproveWithdrawalRequest {
  int64 id = 1;
}

message ApproveWithdrawalReply {
  int32 code = 1;
  string message = 2;
  OperationData data = 3;
}

message RejectWithdrawalRequest {
  int64 id = 1;
  string reason = 2;
}

message RejectWithdrawalReply {
  int32 code = 1;
  string message = 2;
  OperationData data = 3;
}

message OperationData {
  bool success = 1;
}
