syntax = "proto3";

package api.admin.marketing.v1;

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/marketing/v1;v1";

import "google/api/annotations.proto";

// MarketingService 营销服务
service MarketingService {
  // CreateBatchSendEmailTask 创建批量发送邮件任务
  rpc CreateBatchSendEmailTask (CreateBatchSendEmailTaskRequest) returns (CreateBatchSendEmailTaskReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/email/batch/send"
      body: "*"
    };
  }

  // GetBatchSendEmailTaskList 获取批量发送邮件任务列表
  rpc GetBatchSendEmailTaskList (GetBatchSendEmailTaskListRequest) returns (GetBatchSendEmailTaskListReply) {
    option (google.api.http) = {
      get: "/v1/admin/marketing/email/batch/list"
    };
  }

  // StopBatchSendEmailTask 停止批量发送邮件任务
  rpc StopBatchSendEmailTask (StopBatchSendEmailTaskRequest) returns (StopBatchSendEmailTaskReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/email/batch/stop"
      body: "*"
    };
  }

  // GetPreSendEmailCount 获取预发送邮件数量
  rpc GetPreSendEmailCount (GetPreSendEmailCountRequest) returns (GetPreSendEmailCountReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/email/batch/pre-send-count"
      body: "*"
    };
  }

  // GetBatchSendEmailTaskStatus 获取批量发送邮件任务状态
  rpc GetBatchSendEmailTaskStatus (GetBatchSendEmailTaskStatusRequest) returns (GetBatchSendEmailTaskStatusReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/email/batch/status"
      body: "*"
    };
  }

  // CreateQuotaTask 创建配额任务
  rpc CreateQuotaTask (CreateQuotaTaskRequest) returns (CreateQuotaTaskReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/quota/create"
      body: "*"
    };
  }

  // QueryQuotaTaskPreCount 查询配额任务预计数量
  rpc QueryQuotaTaskPreCount (QueryQuotaTaskPreCountRequest) returns (QueryQuotaTaskPreCountReply) {
    option (google.api.http) = {
      post: "/v1/admin/marketing/quota/pre-count"
      body: "*"
    };
  }

  // QueryQuotaTaskList 查询配额任务列表
  rpc QueryQuotaTaskList (QueryQuotaTaskListRequest) returns (QueryQuotaTaskListReply) {
    option (google.api.http) = {
      get: "/v1/admin/marketing/quota/list"
    };
  }
}

// ========== Email Task Messages ==========

// CreateBatchSendEmailTaskRequest 创建批量发送邮件任务请求
message CreateBatchSendEmailTaskRequest {
  string subject = 1;                    // 邮件主题
  string content = 2;                    // 邮件内容
  uint32 scope = 3;                      // 范围: 1:All, 2:Active, 3:Expired, 4:None, 5:Skip
  int64 register_start_time = 4;         // 注册开始时间(Unix时间戳，可选)
  int64 register_end_time = 5;           // 注册结束时间(Unix时间戳，可选)
  string additional = 6;                 // 额外的邮箱地址(换行分隔，可选)
  int64 scheduled = 7;                   // 计划发送时间(Unix时间戳，可选)
  uint32 interval = 8;                   // 发送间隔(秒，可选)
  uint64 limit = 9;                      // 每日发送限制(可选)
}

// CreateBatchSendEmailTaskData 创建批量发送邮件任务数据
message CreateBatchSendEmailTaskData {
  bool success = 1;
}

// CreateBatchSendEmailTaskReply 创建批量发送邮件任务响应
message CreateBatchSendEmailTaskReply {
  int32 code = 1;                            // 状态码
  string message = 2;                        // 消息内容
  CreateBatchSendEmailTaskData data = 3;     // 响应数据
}

// GetBatchSendEmailTaskListRequest 获取批量发送邮件任务列表请求
message GetBatchSendEmailTaskListRequest {
  int32 page = 1;                        // 页码
  int32 size = 2;                        // 每页数量
  optional uint32 scope = 3;             // 范围过滤(可选)
  optional uint32 status = 4;            // 状态过滤: 0:Pending, 1:In Progress, 2:Completed, 3:Failed(可选)
}

// BatchSendEmailTask 批量发送邮件任务
message BatchSendEmailTask {
  int64 id = 1;                          // 任务ID
  string subject = 2;                    // 邮件主题
  string content = 3;                    // 邮件内容
  string recipients = 4;                 // 收件人列表(换行分隔)
  uint32 scope = 5;                      // 范围: 1:All, 2:Active, 3:Expired, 4:None, 5:Skip
  int64 register_start_time = 6;         // 注册开始时间(Unix时间戳)
  int64 register_end_time = 7;           // 注册结束时间(Unix时间戳)
  string additional = 8;                 // 额外的邮箱地址(换行分隔)
  int64 scheduled = 9;                   // 计划发送时间(Unix时间戳)
  uint32 interval = 10;                  // 发送间隔(秒)
  uint64 limit = 11;                     // 每日发送限制
  uint32 status = 12;                    // 任务状态: 0:Pending, 1:In Progress, 2:Completed, 3:Failed
  string errors = 13;                    // 错误信息
  uint32 total = 14;                     // 总数
  uint32 current = 15;                   // 当前处理数
  int64 created_at = 16;                 // 创建时间(Unix时间戳)
  int64 updated_at = 17;                 // 更新时间(Unix时间戳)
}

// GetBatchSendEmailTaskListData 获取批量发送邮件任务列表数据
message GetBatchSendEmailTaskListData {
  int32 total = 1;                       // 总数
  repeated BatchSendEmailTask list = 2;  // 任务列表
}

// GetBatchSendEmailTaskListReply 获取批量发送邮件任务列表响应
message GetBatchSendEmailTaskListReply {
  int32 code = 1;                               // 状态码
  string message = 2;                           // 消息内容
  GetBatchSendEmailTaskListData data = 3;       // 响应数据
}

// StopBatchSendEmailTaskRequest 停止批量发送邮件任务请求
message StopBatchSendEmailTaskRequest {
  int64 id = 1;                          // 任务ID
}

// StopBatchSendEmailTaskData 停止批量发送邮件任务数据
message StopBatchSendEmailTaskData {
  bool success = 1;
}

// StopBatchSendEmailTaskReply 停止批量发送邮件任务响应
message StopBatchSendEmailTaskReply {
  int32 code = 1;                           // 状态码
  string message = 2;                       // 消息内容
  StopBatchSendEmailTaskData data = 3;      // 响应数据
}

// GetPreSendEmailCountRequest 获取预发送邮件数量请求
message GetPreSendEmailCountRequest {
  uint32 scope = 1;                      // 范围: 1:All, 2:Active, 3:Expired, 4:None
  int64 register_start_time = 2;         // 注册开始时间(Unix时间戳，可选)
  int64 register_end_time = 3;           // 注册结束时间(Unix时间戳，可选)
}

// GetPreSendEmailCountData 获取预发送邮件数量数据
message GetPreSendEmailCountData {
  int64 count = 1;                       // 数量
}

// GetPreSendEmailCountReply 获取预发送邮件数量响应
message GetPreSendEmailCountReply {
  int32 code = 1;                         // 状态码
  string message = 2;                     // 消息内容
  GetPreSendEmailCountData data = 3;      // 响应数据
}

// GetBatchSendEmailTaskStatusRequest 获取批量发送邮件任务状态请求
message GetBatchSendEmailTaskStatusRequest {
  int64 id = 1;                          // 任务ID
}

// GetBatchSendEmailTaskStatusData 获取批量发送邮件任务状态数据
message GetBatchSendEmailTaskStatusData {
  uint32 status = 1;                     // 任务状态: 0:Pending, 1:In Progress, 2:Completed, 3:Failed
  uint32 current = 2;                    // 当前处理数
  uint32 total = 3;                      // 总数
  string errors = 4;                     // 错误信息
}

// GetBatchSendEmailTaskStatusReply 获取批量发送邮件任务状态响应
message GetBatchSendEmailTaskStatusReply {
  int32 code = 1;                                 // 状态码
  string message = 2;                             // 消息内容
  GetBatchSendEmailTaskStatusData data = 3;       // 响应数据
}

// ========== Quota Task Messages ==========

// CreateQuotaTaskRequest 创建配额任务请求
message CreateQuotaTaskRequest {
  repeated int64 subscribers = 1;        // 订阅ID列表
  optional bool is_active = 2;           // 是否仅活跃订阅
  int64 start_time = 3;                  // 开始时间过滤(Unix时间戳)
  int64 end_time = 4;                    // 结束时间过滤(Unix时间戳)
  bool reset_traffic = 5;                // 是否重置流量
  uint64 days = 6;                       // 增加天数
  uint32 gift_type = 7;                  // 赠送类型: 1:Fixed, 2:Ratio
  uint64 gift_value = 8;                 // 赠送值
}

// CreateQuotaTaskData 创建配额任务数据
message CreateQuotaTaskData {
  bool success = 1;
}

// CreateQuotaTaskReply 创建配额任务响应
message CreateQuotaTaskReply {
  int32 code = 1;                    // 状态码
  string message = 2;                // 消息内容
  CreateQuotaTaskData data = 3;      // 响应数据
}

// QueryQuotaTaskPreCountRequest 查询配额任务预计数量请求
message QueryQuotaTaskPreCountRequest {
  repeated int64 subscribers = 1;        // 订阅ID列表
  optional bool is_active = 2;           // 是否仅活跃订阅
  int64 start_time = 3;                  // 开始时间过滤(Unix时间戳)
  int64 end_time = 4;                    // 结束时间过滤(Unix时间戳)
}

// QueryQuotaTaskPreCountData 查询配额任务预计数量数据
message QueryQuotaTaskPreCountData {
  int64 count = 1;                       // 数量
}

// QueryQuotaTaskPreCountReply 查询配额任务预计数量响应
message QueryQuotaTaskPreCountReply {
  int32 code = 1;                         // 状态码
  string message = 2;                     // 消息内容
  QueryQuotaTaskPreCountData data = 3;    // 响应数据
}

// QuotaTask 配额任务
message QuotaTask {
  int64 id = 1;                          // 任务ID
  repeated int64 subscribers = 2;        // 订阅ID列表
  optional bool is_active = 3;           // 是否仅活跃订阅
  int64 start_time = 4;                  // 开始时间过滤(Unix时间戳)
  int64 end_time = 5;                    // 结束时间过滤(Unix时间戳)
  bool reset_traffic = 6;                // 是否重置流量
  int64 days = 7;                        // 增加天数
  int32 gift_type = 8;                   // 赠送类型: 1:Fixed, 2:Ratio
  int64 gift_value = 9;                  // 赠送值
  repeated int64 objects = 10;           // 用户订阅ID列表(实际影响的对象)
  uint32 status = 11;                    // 任务状态: 0:Pending, 1:In Progress, 2:Completed, 3:Failed
  uint32 total = 12;                     // 总数
  uint32 current = 13;                   // 当前处理数
  string errors = 14;                    // 错误信息
  int64 created_at = 15;                 // 创建时间(Unix时间戳)
  int64 updated_at = 16;                 // 更新时间(Unix时间戳)
}

// QueryQuotaTaskListRequest 查询配额任务列表请求
message QueryQuotaTaskListRequest {
  int32 page = 1;                        // 页码
  int32 size = 2;                        // 每页数量
  optional uint32 status = 3;            // 状态过滤: 0:Pending, 1:In Progress, 2:Completed, 3:Failed(可选)
}

// QueryQuotaTaskListData 查询配额任务列表数据
message QueryQuotaTaskListData {
  int32 total = 1;                       // 总数
  repeated QuotaTask list = 2;           // 任务列表
}

// QueryQuotaTaskListReply 查询配额任务列表响应
message QueryQuotaTaskListReply {
  int32 code = 1;                      // 状态码
  string message = 2;                  // 消息内容
  QueryQuotaTaskListData data = 3;     // 响应数据
}
