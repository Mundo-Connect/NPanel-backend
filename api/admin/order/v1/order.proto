syntax = "proto3";

package api.admin.order.v1;

import "google/api/annotations.proto";

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/order/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.order.v1";

service OrderService {
  // CreateOrder 创建订单
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderReply) {
    option (google.api.http) = {
      post: "/v1/admin/order"
      body: "*"
    };
  }

  // GetOrderList 获取订单列表
  rpc GetOrderList (GetOrderListRequest) returns (GetOrderListReply) {
    option (google.api.http) = {
      get: "/v1/admin/order/list"
    };
  }

  // UpdateOrderStatus 更新订单状态
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (UpdateOrderStatusReply) {
    option (google.api.http) = {
      put: "/v1/admin/order/status"
      body: "*"
    };
  }
}

// CreateOrderRequest 创建订单请求
message CreateOrderRequest {
  int64 user_id = 1;            // 用户ID
  uint32 type = 2;              // 订单类型：1:订阅 2:续费 3:重置流量 4:充值
  int64 quantity = 3;           // 数量
  int64 price = 4;              // 原价（分）
  int64 amount = 5;             // 订单金额（分）
  int64 discount = 6;           // 折扣金额（分）
  string coupon = 7;            // 优惠券
  int64 coupon_discount = 8;    // 优惠券折扣金额（分）
  int64 commission = 9;         // 订单佣金（分）
  int64 fee_amount = 10;        // 手续费金额（分）
  int64 payment_id = 11;        // 支付方式ID
  string trade_no = 12;         // 交易号
  uint32 status = 13;           // 订单状态：1:待付款 2:已付款 3:关闭 4:失败 5:已完成
  int64 subscribe_id = 14;      // 订阅ID
}

// CreateOrderReply 创建订单响应
message CreateOrderReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// UpdateOrderStatusRequest 更新订单状态请求
message UpdateOrderStatusRequest {
  int64 id = 1;             // 订单ID
  uint32 status = 2;       // 订单状态
  int64 payment_id = 3;    // 支付方式ID（可选）
  string trade_no = 4;     // 交易号（可选）
}

// UpdateOrderStatusReply 更新订单状态响应
message UpdateOrderStatusReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// GetOrderListRequest 获取订单列表请求
message GetOrderListRequest {
  int64 page = 1;          // 页码
  int64 size = 2;          // 每页数量
  int64 user_id = 3;       // 用户ID（可选）
  uint32 status = 4;       // 订单状态（可选）
  int64 subscribe_id = 5;  // 订阅ID（可选）
  string search = 6;       // 搜索关键字
}

// GetOrderListData 获取订单列表数据
message GetOrderListData {
  int32 total = 1;           // 总数
  repeated OrderItem list = 2; // 订单列表
}

// GetOrderListReply 获取订单列表响应
message GetOrderListReply {
  int32 code = 1;            // 状态码
  string message = 2;        // 消息内容
  GetOrderListData data = 3; // 响应数据
}

// OrderItem 订单项
message OrderItem {
  int64 id = 1;                  // 订单ID
  int64 parent_id = 2;         // 父订单ID
  int64 user_id = 3;            // 用户ID
  string order_no = 4;          // 订单号
  uint32 type = 5;              // 订单类型
  int64 quantity = 6;           // 数量
  int64 price = 7;              // 原价（分）
  int64 amount = 8;             // 订单金额（分）
  int64 gift_amount = 9;        // 礼品金额（分）
  int64 discount = 10;          // 折扣金额（分）
  string coupon = 11;           // 优惠券
  int64 coupon_discount = 12;   // 优惠券折扣金额（分）
  int64 commission = 13;        // 订单佣金（分）
  int64 payment_id = 14;        // 支付方式ID
  string method = 15;           // 支付方式名称
  int64 fee_amount = 16;        // 手续费金额（分）
  string trade_no = 17;         // 交易号
  uint32 status = 18;           // 订单状态
  int64 subscribe_id = 19;      // 订阅ID
  string subscribe_token = 20;  // 续费订阅令牌
  bool is_new = 21;             // 是否新订单
  int64 created_at = 22;        // 创建时间（Unix时间戳，毫秒）
  int64 updated_at = 23;        // 更新时间（Unix时间戳，毫秒）
}
