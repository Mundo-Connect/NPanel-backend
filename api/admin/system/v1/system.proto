message VerifyConfig {
  string turnstile_site_key = 1;                 // Turnstile站点密钥
  string turnstile_secret = 2;                   // Turnstile密钥
  bool enable_user_login_captcha = 3;           // 是否启用用户登录验证码
  bool enable_user_register_captcha = 4;        // 是否启用用户注册验证码
  bool enable_user_reset_password_captcha = 5;  // 是否启用用户重置密码验证码
  string captcha_type = 6;                       // 验证码类型: local/slider/turnstile
  bool enable_admin_login_captcha = 7;          // 是否启用管理员登录验证码
}

