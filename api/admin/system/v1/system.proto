syntax = "proto3";

package api.admin.system.v1;

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/system/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.system.v1";

import "google/api/annotations.proto";

service SystemService {
  // GetSystemModule 获取系统模块信息
  rpc GetSystemModule(GetSystemModuleRequest) returns (GetSystemModuleReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/module"
    };
  }

  // GetCurrencyConfig 获取货币配置
  rpc GetCurrencyConfig(GetCurrencyConfigRequest) returns (GetCurrencyConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/currency_config"
    };
  }

  // UpdateCurrencyConfig 更新货币配置
  rpc UpdateCurrencyConfig(UpdateCurrencyConfigRequest) returns (UpdateCurrencyConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/currency_config"
      body: "*"
    };
  }

  // GetInviteConfig 获取邀请配置
  rpc GetInviteConfig(GetInviteConfigRequest) returns (GetInviteConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/invite_config"
    };
  }

  // UpdateInviteConfig 更新邀请配置
  rpc UpdateInviteConfig(UpdateInviteConfigRequest) returns (UpdateInviteConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/invite_config"
      body: "*"
    };
  }

  // GetNodeConfig 获取节点配置
  rpc GetNodeConfig(GetNodeConfigRequest) returns (GetNodeConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/node_config"
    };
  }

  // UpdateNodeConfig 更新节点配置
  rpc UpdateNodeConfig(UpdateNodeConfigRequest) returns (UpdateNodeConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/node_config"
      body: "*"
    };
  }

  // GetPrivacyPolicyConfig 获取隐私政策配置
  rpc GetPrivacyPolicyConfig(GetPrivacyPolicyConfigRequest) returns (GetPrivacyPolicyConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/privacy"
    };
  }

  // UpdatePrivacyPolicyConfig 更新隐私政策配置
  rpc UpdatePrivacyPolicyConfig(UpdatePrivacyPolicyConfigRequest) returns (UpdatePrivacyPolicyConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/privacy"
      body: "*"
    };
  }

  // GetRegisterConfig 获取注册配置
  rpc GetRegisterConfig(GetRegisterConfigRequest) returns (GetRegisterConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/register_config"
    };
  }

  // UpdateRegisterConfig 更新注册配置
  rpc UpdateRegisterConfig(UpdateRegisterConfigRequest) returns (UpdateRegisterConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/register_config"
      body: "*"
    };
  }

  // GetSiteConfig 获取站点配置
  rpc GetSiteConfig(GetSiteConfigRequest) returns (GetSiteConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/site_config"
    };
  }

  // GetTawkConfig 获取Tawk客服配置
  rpc GetTawkConfig(GetTawkConfigRequest) returns (GetTawkConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/tawk_config"
    };
  }

  // UpdateTawkConfig 更新Tawk客服配置
  rpc UpdateTawkConfig(UpdateTawkConfigRequest) returns (UpdateTawkConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/tawk_config"
      body: "*"
    };
  }

  // UpdateSiteConfig 更新站点配置
  rpc UpdateSiteConfig(UpdateSiteConfigRequest) returns (UpdateSiteConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/site_config"
      body: "*"
    };
  }

  // GetSubscribeConfig 获取订阅配置
  rpc GetSubscribeConfig(GetSubscribeConfigRequest) returns (GetSubscribeConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/subscribe_config"
    };
  }

  // UpdateSubscribeConfig 更新订阅配置
  rpc UpdateSubscribeConfig(UpdateSubscribeConfigRequest) returns (UpdateSubscribeConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/subscribe_config"
      body: "*"
    };
  }

  // GetTosConfig 获取服务条款配置
  rpc GetTosConfig(GetTosConfigRequest) returns (GetTosConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/tos_config"
    };
  }

  // UpdateTosConfig 更新服务条款配置
  rpc UpdateTosConfig(UpdateTosConfigRequest) returns (UpdateTosConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/tos_config"
      body: "*"
    };
  }

  // GetVerifyCodeConfig 获取验证码配置
  rpc GetVerifyCodeConfig(GetVerifyCodeConfigRequest) returns (GetVerifyCodeConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/verify_code_config"
    };
  }

  // UpdateVerifyCodeConfig 更新验证码配置
  rpc UpdateVerifyCodeConfig(UpdateVerifyCodeConfigRequest) returns (UpdateVerifyCodeConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/verify_code_config"
      body: "*"
    };
  }

  // GetVerifyConfig 获取验证配置
  rpc GetVerifyConfig(GetVerifyConfigRequest) returns (GetVerifyConfigReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/verify_config"
    };
  }

  // UpdateVerifyConfig 更新验证配置
  rpc UpdateVerifyConfig(UpdateVerifyConfigRequest) returns (UpdateVerifyConfigReply) {
    option (google.api.http) = {
      put: "/v1/admin/system/verify_config"
      body: "*"
    };
  }

  // GetNodeMultiplier 获取节点倍率
  rpc GetNodeMultiplier(GetNodeMultiplierRequest) returns (GetNodeMultiplierReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/get_node_multiplier"
    };
  }

  // PreViewNodeMultiplier 预览节点倍率
  rpc PreViewNodeMultiplier(PreViewNodeMultiplierRequest) returns (PreViewNodeMultiplierReply) {
    option (google.api.http) = {
      get: "/v1/admin/system/node_multiplier/preview"
    };
  }

  // SetNodeMultiplier 设置节点倍率
  rpc SetNodeMultiplier(SetNodeMultiplierRequest) returns (SetNodeMultiplierReply) {
    option (google.api.http) = {
      post: "/v1/admin/system/set_node_multiplier"
      body: "*"
    };
  }

  // SettingTelegramBot 设置Telegram机器人
  rpc SettingTelegramBot(SettingTelegramBotRequest) returns (SettingTelegramBotReply) {
    option (google.api.http) = {
      post: "/v1/admin/system/setting_telegram_bot"
      body: "*"
    };
  }
}

message GetSystemModuleRequest {}

message SystemModule {
  string service_name = 1;
  string service_version = 2;
  string secret = 3;
}

message GetSystemModuleReply {
  int32 code = 1;
  string message = 2;
  SystemModule data = 3;
}

// CurrencyConfig 货币配置
message CurrencyConfig {
  string access_key = 1;        // 访问密钥
  string currency_unit = 2;     // 货币单位
  string currency_symbol = 3;   // 货币符号
}

// InviteConfig 邀请配置
message InviteConfig {
  bool forced_invite = 1;         // 是否强制邀请
  int64 referral_percentage = 2;  // 返利百分比
  bool only_first_purchase = 3;   // 是否仅首次购买
}

// GetCurrencyConfig
message GetCurrencyConfigRequest {}

message GetCurrencyConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  CurrencyConfig data = 3; // 响应数据
}

// UpdateCurrencyConfig
message UpdateCurrencyConfigRequest {
  string access_key = 1;
  string currency_unit = 2;
  string currency_symbol = 3;
}

message UpdateCurrencyConfigData {
  bool success = 1;
}

message UpdateCurrencyConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  UpdateCurrencyConfigData data = 3; // 响应数据
}

// GetInviteConfig
message GetInviteConfigRequest {}

message GetInviteConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  InviteConfig data = 3; // 响应数据
}

// UpdateInviteConfig
message UpdateInviteConfigRequest {
  bool forced_invite = 1;
  int64 referral_percentage = 2;
  bool only_first_purchase = 3;
}

message UpdateInviteConfigData {
  bool success = 1;
}

message UpdateInviteConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  UpdateInviteConfigData data = 3; // 响应数据
}

// NodeDNS 节点DNS配置
message NodeDNS {
  string proto = 1;              // 协议
  string address = 2;            // 地址
  repeated string domains = 3;   // 域名列表
}

// NodeOutbound 节点出站配置
message NodeOutbound {
  string name = 1;              // 名称
  string protocol = 2;          // 协议
  string address = 3;           // 地址
  int64 port = 4;               // 端口
  string password = 5;          // 密码
  repeated string rules = 6;    // 规则列表
}

// NodeConfig 节点配置
message NodeConfig {
  string node_secret = 1;                 // 节点密钥
  int64 node_pull_interval = 2;           // 节点拉取间隔
  int64 node_push_interval = 3;           // 节点推送间隔
  int64 traffic_report_threshold = 4;     // 流量报告阈值
  string ip_strategy = 5;                // IP策略
  repeated NodeDNS dns = 6;              // DNS配置
  repeated string block = 7;             // 屏蔽列表
  repeated NodeOutbound outbound = 8;    // 出站配置
  bool device_admission_enabled = 9;     // 设备准入检查开关
  string device_count_mode = 10;         // 设备计数模式 (ip/connection)
}

// PrivacyPolicyConfig 隐私政策配置
message PrivacyPolicyConfig {
  string privacy_policy = 1;    // 隐私政策内容
}

// GetNodeConfig
message GetNodeConfigRequest {}

message GetNodeConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  NodeConfig data = 3;   // 响应数据
}

// UpdateNodeConfig
message UpdateNodeConfigRequest {
  string node_secret = 1;
  int64 node_pull_interval = 2;
  int64 node_push_interval = 3;
  int64 traffic_report_threshold = 4;
  string ip_strategy = 5;
  repeated NodeDNS dns = 6;
  repeated string block = 7;
  repeated NodeOutbound outbound = 8;
  bool device_admission_enabled = 9;     // 设备准入检查开关
  string device_count_mode = 10;         // 设备计数模式 (ip/connection)
}

message UpdateNodeConfigData {
  bool success = 1;
}

message UpdateNodeConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  UpdateNodeConfigData data = 3; // 响应数据
}

// GetPrivacyPolicyConfig
message GetPrivacyPolicyConfigRequest {}

message GetPrivacyPolicyConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  PrivacyPolicyConfig data = 3; // 响应数据
}

// UpdatePrivacyPolicyConfig
message UpdatePrivacyPolicyConfigRequest {
  string privacy_policy = 1;
}

message UpdatePrivacyPolicyConfigData {
  bool success = 1;
}

message UpdatePrivacyPolicyConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  UpdatePrivacyPolicyConfigData data = 3; // 响应数据
}

// RegisterConfig 注册配置
message RegisterConfig {
  bool stop_register = 1;                    // 是否停止注册
  bool enable_trial = 2;                     // 是否启用试用
  int64 trial_subscribe = 3;                 // 试用订阅
  int64 trial_time = 4;                      // 试用时间
  string trial_time_unit = 5;                // 试用时间单位
  bool enable_ip_register_limit = 6;         // 是否启用IP注册限制
  int64 ip_register_limit = 7;               // IP注册限制
  int64 ip_register_limit_duration = 8;      // IP注册限制时长
  int64 device_limit = 9;                    // 设备限制
}

// SiteConfig 站点配置
message SiteConfig {
  string host = 1;           // 主机地址
  string site_name = 2;      // 站点名称
  string site_desc = 3;      // 站点描述
  string site_logo = 4;      // 站点Logo
  string keywords = 5;       // 关键词
  string custom_html = 6;    // 自定义HTML
  string custom_data = 7;    // 自定义数据
}

// AdminTawkConfig Tawk客服配置
message AdminTawkConfig {
  bool enabled = 1;            // 是否启用
  string property_id = 2;      // Tawk Property ID
  string widget_id = 3;        // Tawk Widget ID
  bool identify_user = 4;      // 是否识别已登录用户
  bool secure_mode = 5;        // 是否启用Secure Mode
  string secret_key = 6;       // Secure Mode密钥
}

// GetRegisterConfig
message GetRegisterConfigRequest {}

message GetRegisterConfigReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  RegisterConfig data = 3; // 响应数据
}

// UpdateRegisterConfig
message UpdateRegisterConfigRequest {
  bool stop_register = 1;
  bool enable_trial = 2;
  int64 trial_subscribe = 3;
  int64 trial_time = 4;
  string trial_time_unit = 5;
  bool enable_ip_register_limit = 6;
  int64 ip_register_limit = 7;
  int64 ip_register_limit_duration = 8;
  int64 device_limit = 9;
}

message UpdateRegisterConfigData {
