message SubscribeConfig {
  bool single_model = 1;          // 是否单模型
  string subscribe_path = 2;      // 订阅路径
  string subscribe_domain = 3;    // 订阅域名
  bool pan_domain = 4;            // 是否泛域名
  bool user_agent_limit = 5;      // 是否用户代理限制
  string user_agent_list = 6;     // 用户代理列表
}

// TosConfig 服务条款配置
message TosConfig {
