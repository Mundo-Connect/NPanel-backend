syntax = "proto3";

package api.admin.announcement.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/announcement/v1;v1";

// 公告服务
service AnnouncementService {
  // 创建公告
  rpc CreateAnnouncement(CreateAnnouncementRequest) returns (AnnouncementReply) {
    option (google.api.http) = {
      post: "/v1/admin/announcement"
      body: "*"
    };
  }

  // 更新公告
  rpc UpdateAnnouncement(UpdateAnnouncementRequest) returns (AnnouncementReply) {
    option (google.api.http) = {
      put: "/v1/admin/announcement"
      body: "*"
    };
  }

  // 获取公告详情
  rpc GetAnnouncement(GetAnnouncementRequest) returns (AnnouncementReply) {
    option (google.api.http) = {
      get: "/v1/admin/announcement/detail"
    };
  }

  // 获取公告列表
  rpc ListAnnouncements(ListAnnouncementsRequest) returns (ListAnnouncementsReply) {
    option (google.api.http) = {
      get: "/v1/admin/announcement/list"
    };
  }

  // 删除公告
  rpc DeleteAnnouncement(DeleteAnnouncementRequest) returns (DeleteAnnouncementReply) {
    option (google.api.http) = {
      delete: "/v1/admin/announcement"
    };
  }
}

// 公告信息
message Announcement {
  int64 id = 1;
  string title = 2;
  string content = 3;
  optional bool show = 4;
  optional bool pinned = 5;
  optional bool popup = 6;
  int64 created_at = 7;  // Unix timestamp in seconds
  int64 updated_at = 8;  // Unix timestamp in seconds
}

// 创建公告请求（仅 title 和 content，与原项目一致）
message CreateAnnouncementRequest {
  string title = 1 [(validate.rules).string = {min_len: 1, max_len: 255}];
  string content = 2 [(validate.rules).string = {min_len: 1}];
}

// 公告数据
message AnnouncementData {
  Announcement announcement = 1;
}

// 公告响应
message AnnouncementReply {
  int32 code = 1;              // 状态码
  string message = 2;          // 消息内容
  AnnouncementData data = 3;   // 响应数据
}

// 更新公告请求
message UpdateAnnouncementRequest {
  int64 id = 1;
  string title = 2 [(validate.rules).string = {min_len: 1, max_len: 255}];
  string content = 3;
  optional bool show = 4;
  optional bool pinned = 5;
  optional bool popup = 6;
}

// 获取公告详情请求
message GetAnnouncementRequest {
  int64 id = 1;
}

// 获取公告列表请求
message ListAnnouncementsRequest {
  int64 page = 1;
  int64 size = 2;
  string search = 3;
  optional bool show = 4;
  optional bool pinned = 5;
  optional bool popup = 6;
}

// 获取公告列表数据
message ListAnnouncementsData {
  repeated Announcement list = 1;
  int32 total = 2;
}

// 获取公告列表响应
message ListAnnouncementsReply {
  int32 code = 1;                   // 状态码
  string message = 2;               // 消息内容
  ListAnnouncementsData data = 3;   // 响应数据
}

// 删除公告请求
message DeleteAnnouncementRequest {
  int64 id = 1;
}

// 删除公告数据
message DeleteAnnouncementData {
  bool success = 1;
}

// 删除公告响应
message DeleteAnnouncementReply {
  int32 code = 1;                   // 状态码
  string message = 2;               // 消息内容
  DeleteAnnouncementData data = 3;  // 响应数据
}
