syntax = "proto3";

package api.admin.ticket.v1;

import "google/api/annotations.proto";

option go_package = "github.com/omnsaas/services/kratos-service/api/admin/ticket/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.ticket.v1";

service Ticket {
  // UpdateTicketStatus 更新工单状态
  rpc UpdateTicketStatus (UpdateTicketStatusRequest) returns (UpdateTicketStatusReply) {
    option (google.api.http) = {
      put: "/v1/admin/ticket"
      body: "*"
    };
  }

  // GetTicket 获取工单详情
  rpc GetTicket (GetTicketRequest) returns (GetTicketReply) {
    option (google.api.http) = {
      get: "/v1/admin/ticket/detail"
    };
  }

  // CreateTicketFollow 创建工单跟进
  rpc CreateTicketFollow (CreateTicketFollowRequest) returns (CreateTicketFollowReply) {
    option (google.api.http) = {
      post: "/v1/admin/ticket/follow"
      body: "*"
    };
  }

  // GetTicketList 获取工单列表
  rpc GetTicketList (GetTicketListRequest) returns (GetTicketListReply) {
    option (google.api.http) = {
      get: "/v1/admin/ticket/list"
    };
  }
}

// UpdateTicketStatusRequest 更新工单状态请求
message UpdateTicketStatusRequest {
  int64 id = 1;        // 工单ID
  int32 status = 2;   // 状态: 1=Pending, 2=Waiting, 3=Processed, 4=Closed
}

// UpdateTicketStatusReply 更新工单状态响应
message UpdateTicketStatusReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// GetTicketRequest 获取工单详情请求
message GetTicketRequest {
  int64 id = 1;   // 工单ID
}

// GetTicketReply 获取工单详情响应
message GetTicketReply {
  int32 code = 1;         // 状态码
  string message = 2;     // 消息内容
  TicketInfo data = 3;    // 响应数据
}

// TicketInfo 工单信息
message TicketInfo {
  int64 id = 1;                      // 工单ID
  string title = 2;                 // 工单标题
  string description = 3;           // 工单描述
  int64 user_id = 4;                // 用户ID
  repeated TicketFollow follow = 5; // 工单跟进列表
  int32 status = 6;                 // 状态
  int64 created_at = 7;             // Unix timestamp in seconds
  int64 updated_at = 8;             // Unix timestamp in seconds
}

// TicketFollow 工单跟进
message TicketFollow {
  int64 id = 1;            // 跟进ID
  int64 ticket_id = 2;    // 工单ID
  string from = 3;        // 来源/操作人
  int32 type = 4;         // 类型: 1=文本, 2=图片
  string content = 5;     // 跟进内容
  int64 created_at = 6;   // Unix timestamp in seconds
}

// CreateTicketFollowRequest 创建工单跟进请求
message CreateTicketFollowRequest {
  int64 ticket_id = 1;  // 工单ID
  string from = 2;      // 来源/操作人
  int32 type = 3;       // 类型: 1=文本, 2=图片
  string content = 4;   // 跟进内容
}

// CreateTicketFollowReply 创建工单跟进响应
message CreateTicketFollowReply {
  int32 code = 1;     // 状态码
  string message = 2; // 消息内容
}

// GetTicketListRequest 获取工单列表请求
message GetTicketListRequest {
  int64 page = 1;        // 页码
  int64 size = 2;        // 每页数量
  int64 user_id = 3;     // 用户ID (可选)
  int32 status = 4;      // 状态 (可选)
  string search = 5;     // 搜索关键词 (可选)
}

// GetTicketListData 工单列表数据
message GetTicketListData {
  int32 total = 1;               // 总数
  repeated TicketInfo list = 2;  // 工单列表
}

// GetTicketListReply 获取工单列表响应
message GetTicketListReply {
  int32 code = 1;              // 状态码
  string message = 2;          // 消息内容
  GetTicketListData data = 3;  // 响应数据
}
