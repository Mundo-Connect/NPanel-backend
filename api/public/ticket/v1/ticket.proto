syntax = "proto3";

package api.public.ticket.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/npanel-dev/NPanel-backend/api/public/ticket/v1;v1";
option java_multiple_files = true;
option java_package = "api.public.ticket.v1";

// Ticket service for users
service Ticket {
  // CreateUserTicket creates a new ticket
  rpc CreateUserTicket (CreateUserTicketRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/public/ticket"
      body: "*"
    };
  }

  // GetUserTicketList gets user's ticket list with pagination
  rpc GetUserTicketList (GetUserTicketListRequest) returns (GetUserTicketListReply) {
    option (google.api.http) = {
      get: "/v1/public/ticket/list"
    };
  }

  // GetUserTicketDetails gets ticket details
  rpc GetUserTicketDetails (GetUserTicketDetailsRequest) returns (TicketInfo) {
    option (google.api.http) = {
      get: "/v1/public/ticket/detail"
    };
  }

  // UpdateUserTicketStatus updates ticket status
  rpc UpdateUserTicketStatus (UpdateUserTicketStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/v1/public/ticket"
      body: "*"
    };
  }

  // CreateUserTicketFollow creates a follow-up for ticket
  rpc CreateUserTicketFollow (CreateUserTicketFollowRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/public/ticket/follow"
      body: "*"
    };
  }
}

// CreateUserTicketRequest is the request to create a ticket
message CreateUserTicketRequest {
  string title = 1;        // Ticket title
  string description = 2;  // Ticket description
}

// GetUserTicketListRequest is the request to get ticket list
message GetUserTicketListRequest {
  int32 page = 1;
  int32 size = 2;
  optional int32 status = 3;
  string search = 4;
}

message GetUserTicketListReply {
  int32 total = 1;
  repeated TicketInfo list = 2;
}

// GetUserTicketDetailsRequest is the request to get ticket details
message GetUserTicketDetailsRequest {
  int64 id = 1;
}

// UpdateUserTicketStatusRequest is the request to update ticket status
message UpdateUserTicketStatusRequest {
  int64 id = 1;
  optional int32 status = 2;
}

// CreateUserTicketFollowRequest is the request to create a follow-up
message CreateUserTicketFollowRequest {
  int64 ticket_id = 1;
  string from = 2;
  int32 type = 3;
  string content = 4;
}

// TicketInfo represents a ticket with follow-ups
message TicketInfo {
  int64 id = 1;
  string title = 2;
  string description = 3;
  int64 user_id = 4;
  repeated TicketFollow follow = 5;
  int32 status = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

// TicketFollow represents a follow-up record
message TicketFollow {
  int64 id = 1;
  int64 ticket_id = 2;
  string from = 3;
  int32 type = 4;
  string content = 5;
  int64 created_at = 6;
}
