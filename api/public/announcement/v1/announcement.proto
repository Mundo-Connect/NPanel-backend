syntax = "proto3";

package api.public.announcement.v1;

option go_package = "github.com/npanel-dev/NPanel-backend/api/public/announcement/v1;v1";

import "google/api/annotations.proto";

// Public Announcement service
// 公共公告服务（需要认证）
service Announcement {
  // QueryAnnouncement 查询公告列表
  rpc QueryAnnouncement (QueryAnnouncementRequest) returns (QueryAnnouncementReply) {
    option (google.api.http) = {
      get: "/v1/public/announcement/list"
    };
  }
}

// QueryAnnouncementRequest 查询公告请求
message QueryAnnouncementRequest {
  int32 page = 1;
  int32 size = 2;
  optional bool pinned = 3;
  optional bool popup = 4;
}

message QueryAnnouncementReply {
  int32 total = 2;
  repeated AnnouncementItem announcements = 1;
}

// AnnouncementItem 公告项
message AnnouncementItem {
  int64 id = 1;
  string title = 2;
  string content = 3;
  optional bool show = 4;
  optional bool pinned = 5;
  optional bool popup = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}
