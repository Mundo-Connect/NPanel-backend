server:
  http:
    addr: 0.0.0.0:8081
    timeout: 55s
  grpc:
    addr: 0.0.0.0:9012
    timeout: 55s
  auth:
    enable_jwt: true
    jwt_secret: "change-this-jwt-secret-before-production"
    no_auth_paths:
      - "/api.public.auth.v1."
      - "/api.public.common.v1."
      - "/api/public/auth/"
      - "/api/public/common/"
      - "/api.server."
  cors:
    enable: true
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "*"
    exposed_headers:
      - "Content-Length"
      - "Authorization"
    allow_credentials: true
    max_age: 86400

log:
  level: info
  format: json
  disable_console: false
  path: logs
  max_size_mb: 100
  max_backups: 30
  max_age_days: 7
  compress: true

data:
  database:
    driver: mysql
    source: npanel:npanel_password@tcp(mysql:3306)/npanel?parseTime=True&loc=Local
  redis:
    addr: redis:6379
    password:
    read_timeout: 0.2s
    write_timeout: 0.2s
    db: 0
    pool_size: 10
    min_idle_conns: 5

app:
  site:
    host: "localhost:8081"
    site_name: "NPanel"
    site_desc: "Professional Panel Management System"
    site_logo: "/assets/logo.png"
    keywords: "panel,management,npanel"
    custom_html: ""
    custom_data: ""

  verify:
    turnstile_site_key: ""
    enable_login_verify: false
    enable_register_verify: false
    enable_reset_password_verify: false

  mobile:
    enable: false
    enable_whitelist: false
    whitelist: []

  email:
    enable: false
    enable_verify: false
    enable_domain_suffix: false
    domain_suffix_list: ""

  register:
    stop_register: false
    enable_ip_register_limit: false
    ip_register_limit: 5
    ip_register_limit_duration: 3600
    enable_trial: false
    trial_subscribe: 7
    trial_time_unit: "day"
    trial_time: 7

  invite:
    forced_invite: false
    referral_percentage: 10
    only_first_purchase: true

  subscribe:
    single_model: false
    subscribe_path: "/subscribe"
    subscribe_domain: ""
    pan_domain: false
    user_agent_limit: false
    user_agent_list: ""

  admin:
    email: "admin@npanel.dev"
    password: "123456"
    algo: "default"
