server:
  http:
    addr: 0.0.0.0:8081
    timeout: 55s
  grpc:
    addr: 0.0.0.0:9012
    timeout: 55s
  auth:
    enable_jwt: true
    jwt_secret: "your-secret-key-change-in-production"
    no_auth_paths:
      - "/api.public.auth.v1."
      - "/api.public.common.v1."
      - "/api/public/auth/"
      - "/api/public/common/"
      - "/api.server."
  cors:
    enable: true
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "*"
    exposed_headers:
      - "Content-Length"
      - "Authorization"
    allow_credentials: true
    max_age: 86400

log:
  level: info
  # 输出格式配置：
  # - json: 结构化 JSON，适合采集到 Loki / ELK / Datadog 等日志系统
  # - console: 人类可读文本
  # - text / plain / pretty: console 的别名，效果等同于 console
  format: json
  # 是否关闭标准输出；false=同时输出到控制台，true=仅写文件
  disable_console: false
  # 日志输出路径：
  # - 写目录，如 logs，会输出到 logs/npanel.debug.log / info / warn / error
  # - 写文件，如 logs/npanel.log，会直接拆分成 logs/npanel.debug.log / info / warn / error
  path: logs
  # 单个日志文件最大体积（MB），超过后轮转
  max_size_mb: 100
  # 最多保留多少个历史日志文件
  max_backups: 30
  # 历史日志最多保留多少天
  max_age_days: 7
  # 是否压缩历史日志文件为 .gz
  compress: true

