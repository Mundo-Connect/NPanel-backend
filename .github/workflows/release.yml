name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.7"
        required: true
        default: "v1.0.7"
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build release artifacts
        run: ./scripts/build-release.sh "${{ inputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.version }}"
          name: "NPanel Backend ${{ inputs.version }}"
          generate_release_notes: true
          prerelease: "${{ inputs.prerelease }}"
          files: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
